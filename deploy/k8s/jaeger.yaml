# Jaeger all-in-one — OpenTelemetry span 을 받아(OTLP) 저장·시각화한다.
# 데모용이라 인메모리 저장(재시작 시 초기화). UI 는 16686.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.60
          env:
            - { name: COLLECTOR_OTLP_ENABLED, value: "true" }
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: ui, containerPort: 16686 }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: shop
spec:
  selector:
    app: jaeger
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: ui, port: 16686, targetPort: 16686 }
