# PostgreSQL — "상태"를 파드 밖으로 뺀다. 6편의 replica 2 + 인메모리 404 문제를 푼다.
#
# StatefulSet 을 쓰는 이유: Deployment 와 달리 안정적인 이름·순서, 그리고 파드마다
# 붙는 영속 볼륨(PVC)을 준다. DB 처럼 정체성과 저장소가 중요한 워크로드에 맞다.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: shop
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: db-credentials
          env:
            # PVC 마운트 지점에 lost+found 가 있어 initdb 가 막히는 걸 피하려 하위 디렉터리 사용.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "shop"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
  # 볼륨 청구 템플릿: 파드마다 1Gi PVC 를 자동 생성해 붙인다. 파드가 죽어도 데이터는 남는다.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# 헤드리스 Service(clusterIP: None): StatefulSet 파드에 안정적인 DNS 이름을 준다.
# 앱은 "postgres:5432" 로 접속한다.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: shop
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
