# 장바구니 서비스. 담기·조회·결제. 결제는 회원 서비스로 회원을 확인하고
# 주문 서비스로 주문을 만든다(동기 호출). 사용자 흐름의 입구다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: cart
          image: go-ddd-shop/cart:part-15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - { name: CUSTOMER_URL, value: "http://customer" }
            - { name: ORDERING_URL, value: "http://ordering" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: shop
spec:
  selector:
    app: cart
  ports:
    - port: 80
      targetPort: 8080
