# 배송 서비스. 주문 확정(order.confirmed)을 구독해 배송을 시작하는 소비자.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping
  template:
    metadata:
      labels:
        app: shipping
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: shipping
          image: go-ddd-shop/shipping:part-18
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shop-config # NATS_URL
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
