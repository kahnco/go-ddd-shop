# 재고 서비스. 이벤트 소비자라 HTTP 를 열지 않으니 Service 가 없다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
        - name: inventory
          image: go-ddd-shop/inventory:part-7
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: shop-config # NATS_URL
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
