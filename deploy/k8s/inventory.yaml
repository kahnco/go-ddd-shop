# 재고 서비스. 비즈니스 입구는 이벤트뿐이지만, 관찰성(/metrics)·probe(/healthz)용
# 최소 HTTP 서버를 8080 에 연다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: shop
spec:
  replicas: 2 # 재고를 Postgres(행 잠금)로 공유하므로 여러 replica 로 안전하게 굴린다
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inventory
          image: go-ddd-shop/inventory:part-23
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shop-config # NATS_URL, NATS_JETSTREAM, OTEL, …
            - secretRef:
                name: ordering-secret # DATABASE_URL(같은 Postgres 공유)
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
