# 주문 서비스. 이제 저장소가 PostgreSQL 이라 replica 2개가 같은 상태를 공유한다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering
  namespace: shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ordering
  template:
    metadata:
      labels:
        app: ordering
      annotations:
        # 프로메테우스가 이 파드의 /metrics 를 스크레이프하도록 알린다.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ordering
          image: go-ddd-shop/ordering:part-21
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          # 설정은 ConfigMap(NATS_URL)에서, 비밀은 Secret(DATABASE_URL)에서 주입.
          envFrom:
            - configMapRef:
                name: shop-config
            - secretRef:
                name: ordering-secret
            - secretRef:
                name: shop-secret # JWT_SECRET(토큰 검증 키)
          # readiness: DB 까지 준비돼야 트래픽을 받는다. liveness: 프로세스 생존만 확인.
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ordering
  namespace: shop
spec:
  selector:
    app: ordering
  ports:
    - port: 80
      targetPort: 8080
