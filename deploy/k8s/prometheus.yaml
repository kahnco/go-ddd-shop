# Prometheus — 각 파드의 /metrics 를 긁어 시계열로 저장한다.
# 파드에 붙은 prometheus.io/scrape·port·path 애너테이션을 보고 대상을 자동 발견한다.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: shop
---
# 파드를 발견하려면 읽기 권한이 필요하다(kubernetes_sd_configs).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-shop
rules:
  - apiGroups: [""]
    resources: [pods, endpoints, services, nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-shop
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-shop
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: shop
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shop
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      # shop 네임스페이스의 파드 중 prometheus.io/scrape=true 인 것만 긁는다.
      - job_name: shop-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [shop]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # 애너테이션의 path·port 로 실제 스크레이프 주소를 만든다.
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: shop
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
