# 회원 서비스. 회원 등록·조회. 장바구니가 결제 시 http://customer/customers/{id} 로 확인한다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer
  template:
    metadata:
      labels:
        app: customer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: customer
          image: go-ddd-shop/customer:part-15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shop-config # NATS_URL, NATS_JETSTREAM
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: customer
  namespace: shop
spec:
  selector:
    app: customer
  ports:
    - port: 80
      targetPort: 8080
