# NATS 브로커. 지금은 단일 파드(무상태 데모). 실서비스라면 JetStream + 클러스터로 간다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2
          args: ["--http_port", "8222"]
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
---
# Service 는 파드에 안정적인 이름(nats)과 가상 IP 를 준다.
# 파드가 재생성돼 IP 가 바뀌어도, 다른 서비스는 "nats:4222" 로 항상 찾을 수 있다.
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: shop
spec:
  selector:
    app: nats
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
