# NATS 브로커 — JetStream 활성화. 이벤트가 스트림에 영속 저장돼, 소비자가 늦게 붙거나
# 잠깐 죽어도 나중에 따라잡을 수 있다. 스트림 데이터를 잃지 않도록 StatefulSet + PVC 로 둔다.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: shop
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2
          args: ["-js", "-sd", "/data", "--http_port", "8222"]
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# Service 는 파드에 안정적인 이름(nats)과 가상 IP 를 준다.
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: shop
spec:
  selector:
    app: nats
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
