# 설정과 비밀을 코드·이미지에서 분리한다(12-factor).
# 비밀이 아닌 설정 → ConfigMap, 비밀(비밀번호·접속 문자열) → Secret.

apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-config
  namespace: shop
data:
  NATS_URL: "nats://nats:4222"
  NATS_JETSTREAM: "1" # JetStream(영속 스트림 + 내구 소비자) 사용
  CATALOG_URL: "http://catalog" # 주문 서비스가 가격 프로젝션을 부트스트랩하는 곳
  OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317" # OpenTelemetry span 을 Jaeger 로 내보냄
---
# ⚠️ 데모용. 실서비스에서는 평문 Secret 을 git 에 커밋하지 않는다 —
# Sealed Secrets·SOPS·External Secrets 등으로 암호화하거나 외부 볼트에서 주입한다.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: shop
type: Opaque
stringData:
  POSTGRES_USER: shop
  POSTGRES_PASSWORD: secret
  POSTGRES_DB: shop
---
apiVersion: v1
kind: Secret
metadata:
  name: ordering-secret
  namespace: shop
type: Opaque
stringData:
  DATABASE_URL: "postgres://shop:secret@postgres:5432/shop?sslmode=disable"
---
# 인증 토큰(JWT) 서명 키. 토큰을 발급하는 회원 서비스와,
# 검증하는 주문·장바구니 서비스가 같은 대칭 키를 공유한다.
# ⚠️ 데모용 평문. 실서비스에서는 볼트/External Secrets 로 주입한다.
apiVersion: v1
kind: Secret
metadata:
  name: shop-secret
  namespace: shop
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-please-32B+"
