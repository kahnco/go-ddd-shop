name: go-ddd-shop

# 한 번의 `docker compose up` 으로 브로커 + 두 서비스를 함께 띄운다.
# 같은 Dockerfile 을 SERVICE 인자만 바꿔 두 번 빌드한다.
services:
  nats:
    image: nats:2
    ports:
      - "4222:4222" # 클라이언트
      - "8222:8222" # 모니터링(http://localhost:8222)
    command: ["--http_port", "8222"]

  ordering:
    build:
      context: .
      args:
        SERVICE: ordering
    environment:
      NATS_URL: nats://nats:4222 # compose 네트워크에서 서비스 이름이 곧 호스트명
    ports:
      - "8080:8080"
    depends_on:
      - nats

  inventory:
    build:
      context: .
      args:
        SERVICE: inventory
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats

  payment:
    build:
      context: .
      args:
        SERVICE: payment
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats

  shipping:
    build:
      context: .
      args:
        SERVICE: shipping
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
