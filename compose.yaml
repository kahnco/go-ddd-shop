name: go-ddd-shop

# 한 번의 `docker compose up` 으로 브로커 + 두 서비스를 함께 띄운다.
# 같은 Dockerfile 을 SERVICE 인자만 바꿔 두 번 빌드한다.
services:
  nats:
    image: nats:2
    ports:
      - "4222:4222" # 클라이언트
      - "8222:8222" # 모니터링(http://localhost:8222)
    command: ["-js", "--http_port", "8222"]

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"      # OTLP gRPC

  catalog:
    build:
      context: .
      args:
        SERVICE: catalog
    environment:
      NATS_URL: nats://nats:4222
      NATS_JETSTREAM: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8084:8080"
    depends_on:
      - nats

  ordering:
    build:
      context: .
      args:
        SERVICE: ordering
    environment:
      NATS_URL: nats://nats:4222 # compose 네트워크에서 서비스 이름이 곧 호스트명
      NATS_JETSTREAM: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      CATALOG_URL: http://catalog:8080 # 가격 프로젝션 부트스트랩
    ports:
      - "8080:8080"
    depends_on:
      - nats
      - catalog

  inventory:
    build:
      context: .
      args:
        SERVICE: inventory
    environment:
      NATS_URL: nats://nats:4222
      NATS_JETSTREAM: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      - nats

  payment:
    build:
      context: .
      args:
        SERVICE: payment
    environment:
      NATS_URL: nats://nats:4222
      NATS_JETSTREAM: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      - nats

  shipping:
    build:
      context: .
      args:
        SERVICE: shipping
    environment:
      NATS_URL: nats://nats:4222
      NATS_JETSTREAM: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      - nats

  customer:
    build:
      context: .
      args:
        SERVICE: customer
    environment:
      NATS_URL: nats://nats:4222
      NATS_JETSTREAM: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8085:8080"
    depends_on:
      - nats

  cart:
    build:
      context: .
      args:
        SERVICE: cart
    environment:
      CUSTOMER_URL: http://customer:8080
      ORDERING_URL: http://ordering:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8086:8080"
    depends_on:
      - customer
      - ordering

  readmodel:
    build:
      context: .
      args:
        SERVICE: readmodel
    environment:
      NATS_URL: nats://nats:4222
      NATS_JETSTREAM: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8087:8080"
    depends_on:
      - nats
